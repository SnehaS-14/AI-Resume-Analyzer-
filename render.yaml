services:
  # Backend API Service
  - type: web
    name: resume-ai-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        scope: build,runtime
      - key: GROQ_API_KEY
        scope: build,runtime
      - key: JWT_SECRET
        scope: build,runtime
      - key: DATABASE_URL
        scope: build,runtime

  # Frontend Service
  - type: static
    name: resume-ai-frontend
    env: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - path: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://resume-ai-backend.onrender.com
        scope: build
